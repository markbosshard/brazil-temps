<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>São Paulo District Map — Safety & Crime</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
 :root{--ink:#0d1426;--panel:#101a2e;--line:#26324a;--muted:#8896ad}
 *{box-sizing:border-box}
 html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--ink);color:#e8eef6}
 #app{position:fixed;inset:0;display:flex;flex-direction:column}
 header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
 header h1{font-size:15px;font-weight:650;margin:0}
 header .sub{font-size:12px;color:var(--muted)}
 #map{flex:1;background:#0d1426}
 .leaflet-tooltip.dlabel{background:transparent;border:none;box-shadow:none;color:#0c1320;
   font-size:10px;font-weight:700;text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff;padding:0}
 .leaflet-tooltip.dlabel.dark{color:#fff;text-shadow:0 0 2px #000,0 0 3px #000,0 0 4px #000}
 .panel{position:absolute;z-index:1000;background:rgba(16,26,46,.93);border:1px solid var(--line);
   border-radius:10px;padding:12px 13px;backdrop-filter:blur(6px)}
 #ctrl{left:12px;top:12px;display:flex;flex-direction:column;gap:9px;min-width:184px}
 #ctrl .cap{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin-bottom:4px}
 #ctrl select{width:100%;background:#0b1322;color:#e8eef6;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12.5px}
 #ctrl .grp{border-top:1px solid var(--line);padding-top:9px}
 .row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px}
 input[type=range]{width:96px;accent-color:#7aa7d6}
 .switch{position:relative;width:38px;height:20px;flex:none}.switch input{display:none}
 .slider{position:absolute;inset:0;background:#2a3551;border-radius:20px;transition:.15s;cursor:pointer}
 .slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
 .switch input:checked + .slider{background:#3f7cc0}.switch input:checked + .slider:before{transform:translateX(18px)}
 #legend{right:12px;bottom:18px;min-width:210px;max-width:250px}
 #legend .ltitle{font-size:11px;font-weight:600;margin-bottom:9px;line-height:1.3}
 .cbrow{display:flex;gap:8px;height:148px}
 .cbar{width:16px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
 .ticks{display:flex;flex-direction:column;justify-content:space-between;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
 .tiers{margin-top:10px;border-top:1px solid var(--line);padding-top:9px;display:none;flex-direction:column;gap:5px}
 .tiers.on{display:flex}
 .tier{display:flex;align-items:center;gap:8px;font-size:11.5px}
 .tier .sw{width:13px;height:13px;border-radius:3px;border:1px solid rgba(255,255,255,.25);flex:none}
 .tier small{color:var(--muted)}
 .desc{font-size:10px;color:var(--muted);margin-top:9px;border-top:1px solid var(--line);padding-top:7px;line-height:1.4}
 .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700;color:#0c1320}
 #hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:1200;display:none;
   background:#3a2326;border:1px solid #6b3b3b;color:#ffd9d9;font-size:12px;padding:8px 12px;border-radius:8px;max-width:340px;text-align:center;line-height:1.4}
 @media(max-width:680px){#legend{min-width:170px}.cbrow{height:120px}}
</style></head>
<body><div id="app">
 <header>
   <h1>São Paulo — District Map</h1>
   <span class="sub">96 districts · switch between security assessment and recorded crime · official district boundaries</span>
 </header>
 <div id="map"></div><div id="hint"></div>

 <div id="ctrl" class="panel">
   <div>
     <span class="cap">Data layer</span>
     <select id="layer">
       <option value="safety" selected>Safety assessment</option>
       <option value="thefts">Thefts (furtos)</option>
       <option value="homicides">Homicides (homicídios)</option>
     </select>
   </div>
   <div class="grp">
     <span class="cap">Underlay</span>
     <select id="base">
       <option value="osm" selected>Street map (OSM)</option>
       <option value="sat">Aerial / satellite</option>
       <option value="cartoDark">Dark</option>
       <option value="cartoLight">Light / minimal</option>
     </select>
   </div>
   <div class="grp">
     <div class="row"><span>Fill opacity</span><input type="range" id="op" min="0" max="100" value="80"></div>
     <div class="row" style="margin-top:7px"><span>District names</span><label class="switch"><input type="checkbox" id="lbl" checked><span class="slider"></span></label></div>
     <div class="row" style="margin-top:7px"><span>Borders</span><label class="switch"><input type="checkbox" id="bord" checked><span class="slider"></span></label></div>
   </div>
 </div>

 <div id="legend" class="panel">
   <div class="ltitle" id="lg-title"></div>
   <div class="cbrow"><div class="cbar" id="lg-bar"></div><div class="ticks" id="lg-ticks"></div></div>
   <div class="tiers" id="lg-tiers">
     <div class="tier"><span class="sw" id="sw1"></span>Safe <small>&nbsp;1–2.5</small></div>
     <div class="tier"><span class="sw" id="sw2"></span>Moderate <small>&nbsp;2.5–5</small></div>
     <div class="tier"><span class="sw" id="sw3"></span>Caution <small>&nbsp;5–7.5</small></div>
     <div class="tier"><span class="sw" id="sw4"></span>Avoid <small>&nbsp;7.5–10</small></div>
   </div>
   <div class="desc" id="lg-desc"></div>
 </div>
</div>

const DARKBASE={osm:false,sat:true,cartoLight:false,cartoDark:true};
let layerKey='safety';

function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lerp(a,b,t){return a+(b-a)*t}
function colorFor(key,v){
  const L=CMAPS[key]; if(v==null) return '#555c6b';
  let t=(v-L.min)/(L.max-L.min); t=Math.max(0,Math.min(1,t));
  const s=L.stops;
  for(let i=1;i<s.length;i++){ if(t<=s[i][0]){
    const [t0,c0]=s[i-1],[t1,c1]=s[i],u=(t-t0)/((t1-t0)||1),a=hx(c0),b=hx(c1);
    return `rgb(${Math.round(lerp(a[0],b[0],u))},${Math.round(lerp(a[1],b[1],u))},${Math.round(lerp(a[2],b[2],u))})`;}}
  return s[s.length-1][1];
}
function fmt(key,v){if(v==null)return 'n/a';return CMAPS[key].fmt==='int'?Math.round(v).toLocaleString():v.toFixed(1);}
function tierName(v){if(v==null)return['—','#555c6b'];if(v<2.5)return['Safe',colorFor('safety',v)];
  if(v<5)return['Moderate',colorFor('safety',v)];if(v<7.5)return['Caution',colorFor('safety',v)];return['Avoid',colorFor('safety',v)];}

// --- map ---
const map=L.map('map',{zoomControl:true,attributionControl:true,minZoom:9}).setView([-23.65,-46.63],11);
function mk(u,o){return L.tileLayer(u,Object.assign({maxZoom:19},o))}
const bases={

 sat:mk('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Imagery &copy; Esri'}),

};
let curKey='osm', curBase=bases.osm.addTo(map);
let tileErr=0,tileOk=false;
Object.values(bases).forEach(l=>{l.on('tileerror',()=>{if(++tileErr>=3&&!tileOk)hint.style.display='block'});l.on('tileload',()=>{tileOk=true;hint.style.display='none'})});
hint.innerHTML='Base tiles blocked in this preview. <b>Open this file in a browser</b> and the street/aerial layers load and align exactly.';

let opacity=0.80, showBorders=true, showLabels=true;
const layers=[];
function styleFor(d){const v=d.vals[layerKey];
  return {color:showBorders?'#0d1426':colorFor(layerKey,v),weight:showBorders?0.7:0.3,
    opacity:showBorders?0.85:0.3,fillColor:colorFor(layerKey,v),fillOpacity:opacity};}
DATA.forEach(d=>{
  const lyr=L.geoJSON({type:'Feature',geometry:d.geom},{style:styleFor(d)}).addTo(map);
  lyr._d=d; layers.push(lyr);
  const t=L.tooltip({permanent:true,direction:'center',className:'dlabel',opacity:1})
    .setContent(d.name).setLatLng([d.label[1],d.label[0]]); lyr._tip=t;
  lyr.on('mouseover',()=>{lyr.setStyle({weight:2.2,color:'#fff',opacity:1});lyr.bringToFront()});
  lyr.on('mouseout',()=>lyr.setStyle(styleFor(lyr._d)));
  lyr.on('click',e=>{
    const v=d.vals[layerKey]; const L=CMAPS[layerKey];
    let extra='';
    if(layerKey==='safety'){const [tn,tc]=tierName(v);extra=`<br><span class="pill" style="background:${tc}">${tn}</span>`;}
    L_pop(e.latlng,`<b>${d.name}</b><br>${L.title.split(' ·')[0].split(' (')[0]}: <b>${fmt(layerKey,v)}</b>${layerKey!=='safety'?'':' / 10'}${extra}`);
  });
});
function L_pop(ll,html){L.popup().setLatLng(ll).setContent(html).openOn(map);}
const grp=L.featureGroup(layers); map.fitBounds(grp.getBounds().pad(0.03));

function restyle(){layers.forEach(l=>l.setStyle(styleFor(l._d)));}
function applyLabelColor(){const dark=DARKBASE[curKey];
  document.querySelectorAll('.leaflet-tooltip.dlabel').forEach(el=>el.classList.toggle('dark',dark));}
function refreshLabels(){const z=map.getZoom();
  layers.forEach(l=>{const on=showLabels&&z>=12; on?l._tip.addTo(map):map.removeLayer(l._tip);});
  if(showLabels)applyLabelColor();}
map.on('zoomend',refreshLabels);

function renderLegend(){
  const L=CMAPS[layerKey];
  document.getElementById('lg-title').textContent=L.title;
  const grad=L.stops.map(s=>`${s[1]} ${(s[0]*100).toFixed(1)}%`).join(',');
  document.getElementById('lg-bar').style.background=`linear-gradient(to top, ${grad})`;
  const tk=document.getElementById('lg-ticks');
  tk.innerHTML=L.ticks.slice().reverse().map(t=>`<span>${t.toLocaleString()}</span>`).join('');
  document.getElementById('lg-tiers').classList.toggle('on', !!L.tiers);
  if(L.tiers){sw1.style.background=colorFor('safety',1.6);sw2.style.background=colorFor('safety',3.7);
    sw3.style.background=colorFor('safety',6.2);sw4.style.background=colorFor('safety',8.7);}
  document.getElementById('lg-desc').textContent=L.desc;
}

document.getElementById('layer').onchange=e=>{layerKey=e.target.value;restyle();renderLegend();};
document.getElementById('base').onchange=e=>{map.removeLayer(curBase);curKey=e.target.value;curBase=bases[curKey].addTo(map);curBase.bringToBack();applyLabelColor();};
document.getElementById('op').oninput=e=>{opacity=e.target.value/100;restyle();};
document.getElementById('bord').onchange=e=>{showBorders=e.target.checked;restyle();};
document.getElementById('lbl').onchange=e=>{showLabels=e.target.checked;refreshLabels();};

renderLegend(); refreshLabels();
</script></body></html>
