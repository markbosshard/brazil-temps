<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temperaturas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{
    --bg:#0c1116; --panel:#141c24; --panel-2:#0f161d;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.05);
    --ink:#eaf0f5; --muted:#8a97a4; --faint:#5d6b78; --accent:#7fd0b6;
    --sans:'Space Grotesk',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1100px 700px at 78% -8%, #16222e 0%, transparent 60%),var(--bg);
    color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; padding:22px;
  }
  .wrap{max-width:1080px;margin:0 auto}

  /* COUNTRY SWITCHER */
  .switcher{display:inline-flex;gap:4px;padding:4px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;margin-bottom:18px}
  .switcher button{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:0;border-radius:999px;padding:7px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s,color .15s}
  .switcher button .flag{font-size:16px;line-height:1}
  .switcher button:hover{color:var(--ink)}
  .switcher button.on{background:rgba(127,208,182,.14);color:var(--ink);box-shadow:inset 0 0 0 1px rgba(127,208,182,.35)}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:18px}
  .brand .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint);margin:0 0 6px}
  .brand h1{margin:0;font-size:clamp(22px,3.2vw,32px);font-weight:600;letter-spacing:-.01em;line-height:1.05}
  .brand h1 b{color:var(--accent);font-weight:600}
  .readout{text-align:right;line-height:1}
  .readout .lab{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .readout .month{font-family:var(--mono);font-weight:600;font-size:clamp(30px,5vw,46px);letter-spacing:-.02em;color:var(--ink);display:block;margin-top:2px}

  .stage{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:14px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:14px}
  .card h2{margin:0 0 10px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

  #map{width:100%;height:auto;display:block}
  .state{stroke:rgba(0,0,0,.35);stroke-width:.4;transition:fill .25s}
  .inset-box{fill:var(--panel-2);stroke:var(--line);stroke-width:1;rx:8}
  .inset-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;fill:var(--faint)}
  .dot-glow{filter:blur(7px);opacity:.55}
  .dot{stroke:rgba(255,255,255,.85);stroke-width:1.1;cursor:pointer;transition:fill .25s,r .25s}
  .dot-lab{font-family:var(--mono);font-weight:600;font-size:10.5px;fill:#fff;paint-order:stroke;stroke:rgba(0,0,0,.55);stroke-width:2.4px;stroke-linejoin:round;pointer-events:none}
  .city-name{font-family:var(--sans);font-size:9px;fill:var(--muted);pointer-events:none}

  .legend{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .scalebar{height:9px;flex:1;min-width:130px;border-radius:5px;background:linear-gradient(90deg,#3157a8,#3b82c4,#46b3b3,#7fc66a,#e8c44a,#ef8a3c,#df4a2f)}
  .scaleends{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .regions{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
  .regions span{font-family:var(--mono);font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .regions i{width:9px;height:9px;border-radius:2px;display:inline-block}

  #ladder{display:flex;flex-direction:column;gap:2px}
  .row{display:grid;grid-template-columns:84px 1fr auto;align-items:center;gap:10px;padding:5px 2px;border-bottom:1px solid var(--line-2)}
  .row:last-child{border-bottom:0}
  .rname{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rname small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.10em;color:var(--faint);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bars{display:flex;flex-direction:column;gap:4px}
  .bar{position:relative;height:16px}
  .bar .grid{position:absolute;inset:0;border-left:1px solid var(--line-2);border-right:1px solid var(--line-2)}
  .seg{position:absolute;top:50%;transform:translateY(-50%);height:7px;border-radius:4px;transition:left .25s,width .25s,background .25s}
  .med{position:absolute;top:50%;width:2px;height:14px;background:#fff;transform:translate(-50%,-50%);border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.5);transition:left .25s}
  .hbar{position:relative;height:7px;border-radius:4px;background:var(--line-2);overflow:hidden}
  .hfill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;background:linear-gradient(90deg,#3a6fa0,#5b9bd5);transition:width .25s}
  .nums{display:flex;flex-direction:column;gap:3px;text-align:right;white-space:nowrap}
  .numsT{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .numsT b{color:var(--ink);font-weight:600}
  .numsT .lo{color:#7fb6e0}.numsT .hi{color:#f0966a}
  .numsH{font-family:var(--mono);font-size:10px;color:#6ea8d8;letter-spacing:.03em}

  .timeline{margin-top:14px}
  .tl-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  .tl-head .hint{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
  .play{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:rgba(127,208,182,.12);border:1px solid rgba(127,208,182,.35);border-radius:999px;padding:6px 14px;cursor:pointer;white-space:nowrap}
  .play:hover{background:rgba(127,208,182,.2)}
  .track{position:relative;height:46px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);touch-action:none;cursor:pointer;outline:none}
  .track:focus-visible{box-shadow:0 0 0 2px rgba(127,208,182,.6)}
  .ticks{position:absolute;inset:0;pointer-events:none}
  .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--line-2)}
  .mlab{position:absolute;top:50%;transform:translate(-50%,-50%);font-family:var(--mono);font-size:11px;color:var(--faint);transition:color .15s,font-weight .15s}
  .mlab.on{color:var(--ink);font-weight:600}
  .handle{position:absolute;top:-7px;bottom:-7px;width:4px;border-radius:4px;background:var(--accent);transform:translateX(-50%);box-shadow:0 0 16px rgba(127,208,182,.7);pointer-events:none}
  .handle::after{content:"";position:absolute;left:50%;top:-9px;width:13px;height:13px;border-radius:50%;background:var(--accent);transform:translateX(-50%);box-shadow:0 0 14px rgba(127,208,182,.8)}

  .foot{margin-top:12px;font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.5}

  @media (max-width:760px){
    body{padding:14px}
    .stage{grid-template-columns:1fr}
    header{align-items:center}
    .readout{text-align:left}
    .row{grid-template-columns:74px 1fr auto;gap:7px}
    .city-name{display:none}
    .tl-head{flex-direction:column;align-items:flex-start}
  }
  @media (prefers-reduced-motion:reduce){ .state,.dot,.seg,.med{transition:none} }
</style>

<div class="wrap">
  <div class="switcher" id="switcher" role="tablist" aria-label="Country"></div>

  <header>
    <div class="brand">
      <p class="eyebrow" id="eyebrow"></p>
      <h1 id="h1"></h1>
    </div>
    <div class="readout">
      <span class="lab" id="showing"></span>
      <span class="month" id="monthOut"></span>
    </div>
  </header>

  <div class="stage">
    <div class="card">
      <h2 id="mapH2"></h2>
      <svg id="map" preserveAspectRatio="xMidYMid meet" role="img"></svg>
      <div class="legend">
        <span class="scaleends" id="cold"></span>
        <div class="scalebar"></div>
        <span class="scaleends" id="hot"></span>
      </div>
      <div class="regions" id="regions"></div>
    </div>

    <div class="card">
      <h2 id="ladderH2"></h2>
      <div id="ladder"></div>
    </div>
  </div>

  <div class="card timeline">
    <div class="tl-head">
      <span class="hint" id="hint"></span>
      <button class="play" id="play"></button>
    </div>
    <div class="track" id="track" tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="11" aria-valuenow="0">
      <div class="ticks" id="ticks"></div>
      <div class="handle" id="handle" style="left:0%"></div>
    </div>
    <p class="foot" id="foot"></p>
  </div>
</div>

/* ---------- STATE ---------- */
const VALID=['br','ch','es'];
function initialCountry(){
  const p=new URLSearchParams(location.search).get('country');
  return (p && VALID.includes(p.toLowerCase())) ? p.toLowerCase() : 'br';
}
let cur=initialCountry();
let P=0;

const svg=d3.select('#map');
const track=document.getElementById('track');
let nodes=[], rowEls={};

/* ---------- LANGUAGE / STATIC TEXT ---------- */
function applyLang(){
  const C=COUNTRIES[cur], T=STR[C.lang];
  document.documentElement.lang=C.lang;
  document.title=C.title;
  document.getElementById('eyebrow').textContent=T.eyebrow(C.cities.length);
  document.getElementById('h1').innerHTML=C.h1;
  document.getElementById('showing').textContent=T.showing;
  document.getElementById('mapH2').textContent=T.warm;
  document.getElementById('cold').textContent=T.cold;
  document.getElementById('hot').textContent=T.hot;
  document.getElementById('ladderH2').innerHTML=T.ladder;
  document.getElementById('hint').textContent=T.hint;
  document.getElementById('foot').textContent=T.foot;
  document.getElementById('play').textContent=playing?T.pause:T.play;
  svg.attr('aria-label',C.mapAria);
  track.setAttribute('aria-label',T.monthAria);
  // region legend
  const reg=d3.select('#regions');
  reg.selectAll('*').remove();
  reg.selectAll('span').data(Object.keys(C.regions)).enter().append('span')
     .html(r=>`<i style="background:${C.regions[r]}"></i>${r}`);
}

/* ---------- MAP ---------- */
function renderMap(){
  const C=COUNTRIES[cur], [W,H]=C.viewBox;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const mainFeats=C.geo.features.filter(f=>!f.properties.inset);
  const insetFeats=C.geo.features.filter(f=>f.properties.inset);
  const mainProj=d3.geoMercator().fitExtent([[14,14],[W-14,H-14]],{type:'FeatureCollection',features:mainFeats});
  const mainPath=d3.geoPath(mainProj);

  svg.append('g').selectAll('path').data(mainFeats).enter().append('path')
     .attr('class','state').attr('d',mainPath)
     .attr('fill',d=>C.regions[d.properties.region]||'#222');

  let insetProj=null;
  if(C.inset){
    const [bx,by,bw,bh]=C.inset.box;
    svg.append('rect').attr('class','inset-box').attr('x',bx).attr('y',by).attr('width',bw).attr('height',bh).attr('rx',8);
    svg.append('text').attr('class','inset-label').attr('x',bx+9).attr('y',by+15).text(C.inset.label);
    insetProj=d3.geoMercator().fitExtent([[bx+9,by+22],[bx+bw-9,by+bh-9]],{type:'FeatureCollection',features:insetFeats});
    const ip=d3.geoPath(insetProj);
    svg.append('g').selectAll('path').data(insetFeats).enter().append('path')
       .attr('class','state').attr('d',ip)
       .attr('fill',d=>C.regions[d.properties.region]||'#222');
  }

  const layer=svg.append('g');
  nodes=C.cities.map(c=>{
    const proj=(c.inset&&insetProj)?insetProj:mainProj;
    const [x,y]=proj([c.lon,c.lat]);
    const g=layer.append('g').attr('transform',`translate(${x},${y})`);
    const glow=g.append('circle').attr('class','dot-glow').attr('r',12);
    const dot=g.append('circle').attr('class','dot').attr('r',8);
    if(!c.inset){
      const n=c.nudge||{};
      g.append('text').attr('class','city-name')
       .attr('x',n.x||0).attr('y',n.y||20)
       .attr('text-anchor',n.anchor||'middle').text(c.name);
    }
    const lab=g.append('text').attr('class','dot-lab').attr('x',0).attr('y',3.5).attr('text-anchor','middle');
    return {c,dot,glow,lab};
  });
}

/* ---------- LADDER ---------- */
function buildLadder(){
  const C=COUNTRIES[cur];
  const ladder=document.getElementById('ladder');
  ladder.innerHTML=''; rowEls={};
  C.order.forEach(nm=>{
    const c=C.cities.find(x=>x.name===nm);
    const row=document.createElement('div');row.className='row';
    row.innerHTML=`
      <div class="rname">${c.name}<small>${c.region}</small></div>
      <div class="bars">
        <div class="bar"><div class="grid"></div><div class="seg"></div><div class="med"></div></div>
        <div class="hbar"><div class="hfill"></div></div>
      </div>
      <div class="nums">
        <div class="numsT"><span class="lo"></span> <b></b> <span class="hi"></span></div>
        <div class="numsH"><span class="rh"></span></div>
      </div>`;
    ladder.appendChild(row);
    rowEls[nm]={seg:row.querySelector('.seg'),med:row.querySelector('.med'),
                lo:row.querySelector('.lo'),b:row.querySelector('b'),hi:row.querySelector('.hi'),
                hfill:row.querySelector('.hfill'),rh:row.querySelector('.rh')};
  });
}

/* ---------- TICKS ---------- */
function buildTicks(){
  const T=STR[COUNTRIES[cur].lang];
  const ticks=document.getElementById('ticks');
  ticks.innerHTML='';
  T.mabbr.forEach((m,i)=>{
    const left=i/11*100;
    const t=document.createElement('div');t.className='tick';t.style.left=left+'%';ticks.appendChild(t);
    const l=document.createElement('div');l.className='mlab';l.style.left=left+'%';l.textContent=m;
    if(i===0)l.style.transform='translate(0,-50%)';
    if(i===11)l.style.transform='translate(-100%,-50%)';
    ticks.appendChild(l);
  });
  // re-add handle on top
  ticks.parentNode.appendChild(document.getElementById('handle'));
}

/* ---------- UPDATE ---------- */
const lerp=(a,b,t)=>a+(b-a)*t;
function valsAt(c,p){
  const m0=Math.floor(p),m1=Math.min(m0+1,11),t=p-m0;
  return {min:lerp(c.min[m0],c.min[m1],t),med:lerp(c.med[m0],c.med[m1],t),max:lerp(c.max[m0],c.max[m1],t),rh:c.rh?lerp(c.rh[m0],c.rh[m1],t):0};
}
const r1=v=>Math.round(v);
function update(p){
  const C=COUNTRIES[cur], T=STR[C.lang];
  const pct=v=>((v-C.gmin)/(C.gmax-C.gmin))*100;
  document.getElementById('monthOut').textContent=T.months[Math.round(p)];
  nodes.forEach(n=>{
    const v=valsAt(n.c,p), col=heat(v.med);
    n.dot.attr('fill',col); n.glow.attr('fill',col); n.lab.text(r1(v.med));
  });
  C.cities.forEach(c=>{
    const el=rowEls[c.name]; if(!el)return;
    const v=valsAt(c,p), col=heat(v.med);
    el.seg.style.left=pct(v.min)+'%';
    el.seg.style.width=Math.max(0,(pct(v.max)-pct(v.min)))+'%';
    el.seg.style.background=col;
    el.med.style.left=pct(v.med)+'%';
    el.lo.textContent=r1(v.min)+'°';
    el.b.textContent=r1(v.med)+'°';
    el.hi.textContent=r1(v.max)+'°';
    el.hfill.style.width=Math.max(0,Math.min(100,v.rh))+'%';
    el.rh.textContent='rH '+r1(v.rh)+'%';
  });
  document.querySelectorAll('.mlab').forEach((m,i)=>m.classList.toggle('on',i===Math.round(p)));
  document.getElementById('handle').style.left=(p/11*100)+'%';
  track.setAttribute('aria-valuenow',Math.round(p));
  track.setAttribute('aria-valuetext',T.months[Math.round(p)]);
}

/* ---------- COUNTRY SWITCH ---------- */
function setCountry(code,push){
  stop();
  cur=code;
  document.querySelectorAll('#switcher button').forEach(b=>{
    const on=b.dataset.code===code;
    b.classList.toggle('on',on); b.setAttribute('aria-selected',on);
  });
  applyLang(); renderMap(); buildLadder(); buildTicks(); update(P);
  if(push){
    const u=new URL(location); u.searchParams.set('country',code);
    history.replaceState(null,'',u);
  }
}

/* build switcher */
const sw=document.getElementById('switcher');
VALID.forEach(code=>{
  const C=COUNTRIES[code];
  const b=document.createElement('button');
  b.dataset.code=code; b.setAttribute('role','tab');
  b.innerHTML=`<span class="flag">${C.flag}</span>${C.label}`;
  b.addEventListener('click',()=>setCountry(code,true));
  sw.appendChild(b);
});

/* ---------- TIMELINE INTERACTION ---------- */
const setP=p=>{P=Math.max(0,Math.min(11,p));update(P)};
function xToP(clientX){
  const r=track.getBoundingClientRect(),pad=10;
  const x=Math.max(pad,Math.min(r.width-pad,clientX-r.left));
  return ((x-pad)/(r.width-2*pad))*11;
}
let dragging=false;
track.addEventListener('pointerdown',e=>{dragging=true;track.setPointerCapture(e.pointerId);stop();setP(xToP(e.clientX))});
track.addEventListener('pointermove',e=>{if(dragging)setP(xToP(e.clientX))});
track.addEventListener('pointerup',()=>dragging=false);
track.addEventListener('pointercancel',()=>dragging=false);
track.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='ArrowLeft'||k==='ArrowDown'){stop();setP(Math.round(P)-1);e.preventDefault()}
  else if(k==='ArrowRight'||k==='ArrowUp'){stop();setP(Math.round(P)+1);e.preventDefault()}
  else if(k==='Home'){stop();setP(0);e.preventDefault()}
  else if(k==='End'){stop();setP(11);e.preventDefault()}
});

/* ---------- PLAY ---------- */
let raf=null,playing=false;
const playBtn=document.getElementById('play');
function stop(){if(raf)cancelAnimationFrame(raf);raf=null;playing=false;playBtn.textContent=STR[COUNTRIES[cur].lang].play}
function start(){
  playing=true;playBtn.textContent=STR[COUNTRIES[cur].lang].pause;let last=performance.now();
  const step=now=>{
    if(!playing)return;
    const dt=(now-last)/1000;last=now;
    let np=P+dt*2.2; if(np>11)np=0;
    setP(np);raf=requestAnimationFrame(step);
  };
  raf=requestAnimationFrame(step);
}
playBtn.addEventListener('click',()=>playing?stop():start());

/* ---------- INIT ---------- */
setCountry(cur,false);
</script>
